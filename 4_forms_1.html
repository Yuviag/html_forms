<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <form action="POST">
        <fieldset>
            <legend>
                Personal Details
            </legend>
            
            <label for="">Firstname:</label>
            <input type="text">

            <br><br>

            <label for="">Middlename:</label>
            <input type="text">

            <br><br>

            <label for="">Lastname:</label>
            <input type="text">

            <br><br>

            <label for="">Course</label>
            <select name="" id="">Courses
                <option value="">MCA</option>
                <option value="">BCA</option>
                <option value="">BBA</option>
                <option value="">B.Tech</option>
                <option value="">M.Tech</option>
                <option value="">MBA</option>
                <option value="">Course</option>
            </select>

            <br><br>

            <label for="gender">Gender:</label>

            <br>

            <input type="radio" name="gender" id="gender">
            <label for="">Male</label>

            <br>

            <input type="radio" name="gender" id="gender">
            <label for="">Female</label>

            <br>

            <input type="radio" name="gender" id="gender">
            <label for="">Other</label>

            <br><br>

            <label for="">DOB</label>
            <input type="datetime-local">

            <br><br>

            <label for="" style="color: brown;">Phone:</label>
            <input type="number" disabled placeholder="+91" size="2">
            <input type="number">

            <br><br><br>

            <label for="">Address</label>

            <br>

            <textarea name="" id="" placeholder="Full Address"></textarea>

            <br><br>

            <label for="">Email:</label>
            <input type="email" name="" id="">

            <br><br>

            <label for="">Password:</label>
            <input type="password">

            <br><br>

            <label for="">Re-type Password:</label>
            <input type="password" name="" id="">

            <br><br>

            <input type="checkbox" name="" id="">
            <label for="">Agree to terms and conditions</label>

            <br><br>

            <label for="">Choose file: </label>
            <input type="file" name="" id="">

            <br><br>

            <label for="">Choose color: </label>
            <input type="color" name="" id="">

            <br><br>

            <button type="reset">Reset</button>
            <button type="submit">Submit</button>
        </fieldset>

    </form>

</body>

</html>
